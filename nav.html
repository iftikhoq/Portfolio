<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<style>
    .nav {
        position: fixed;
        height: 12vh;
        width: 100%;
        transition: top 0.5s;
        z-index: 10;
    }

    .logo {
    }

    .nav ul {
        float: right;
        margin-right: 100px;
    }

    .nav ul li {
        display: inline-block;
        margin-top: 20px;
    }

    .nav ul li a {
        color: black;
        font-size: 20px;
        font-weight: bold;
        padding: 10px;
        border-radius: 5px;
        text-decoration: none;
    }

    .nav ul li a span {
        display: inline-block;
        position: relative;
        background-color: rgb(193, 193, 193);
        color: white;
        width: 20px;
        height: 20px;
        border-radius: 150px;
        text-align: center;
        top: -10px;
        left: -2px;
    }

    .nav ul li a:hover {
        background-color: rgba(198, 186, 186, 0.781);
        transition: .5s;
    }

    .checkbtn {
        font-size: 30px;
        color: black;
        float: right;
        height: 80px;
        margin-right: 50px;
        cursor: pointer;
        display: none;
    }

    .checkbtn i {
        line-height: 15vh;
    }

    #check {
        display: none;
    }


    @media (max-width: 1020px) {
        .checkbtn {
            display: block;
        }

        label.logo {
            transition: .5s;
        }

        #side {
            position: absolute;
            width: 80%;
            margin-left: 8%;
            height: 42vh;
            border-radius: 10px;
            background: #4E4E50;
            top: 12vh;
            left: -100%;
            transition: 0.5s;
            text-align: center;
            font-weight: 900;
            z-index: 99999;
        }

        .nav ul li {
            display: block;
            margin-top: 4vh;
        }

        .nav ul li a {
            font-size: 20px;
            font-weight: bolder;
            color: white;
            border-radius: 3px;
        }

        a:hover {
            background: none;
            color: rgb(14, 14, 14);
        }

        #check:checked~ul {
            left: 0;
        }
    }
</style>

<body>

    <script>
        $check=0;
        var prevScrollpos = window.pageYOffset;
        window.onscroll = function () {
            var currentScrollPos = window.pageYOffset;
            if (prevScrollpos > currentScrollPos) {
                document.getElementById("navbar").style.top = "0";
                document.getElementById("side").style.left = "-100%";
            }
            else {
                document.getElementById("navbar").style.top = "-15vh";
                document.getElementById("side").style.left = "-100%";
            }
            prevScrollpos = currentScrollPos;
        }

        $('#check').click(function (e) {
            e.stopPropagation();
            if($check==0){
                document.getElementById("side").style.left = "0";
                $check=1;
            }
            else{
                document.getElementById("side").style.left = "-100%";
                $check=0;
            }

        });
        $('#port').click(function (e) {
            e.stopPropagation();
            document.getElementById("side").style.left = "-100%";
        });
        

    </script>

    <div class="nav" id="navbar">
        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">
            <i class="fa-solid fa-bars"></i>
        </label>

        <label class="logo">
             <a href="index.html">
                <img src="signfullblack.png" height="100px" width="300px">
            </a>

        </label>

        <ul id="side">
            <li><a href="login.php">Login</a></li>
            <li><a href="signup.php">Sign up</a></li>
        </ul>
    </div>
</body>

</html>
